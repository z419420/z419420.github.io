<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>acme — Web3 Community & Growth</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="kit.css">
  <script src="https://unpkg.com/lucide@0.292.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="About.jsx"></script>
  <script type="text/babel" src="Quote.jsx"></script>
  <script type="text/babel" src="Highlights.jsx"></script>
  <script type="text/babel" src="Experience.jsx"></script>
  <script type="text/babel" src="Skills.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>

  <script type="text/babel">
    function Footer() {
      return (
        <footer className="footer">
          <div className="wrap footer-inner">
            <span>© 2026 Timur Mirassov · acme</span>
            <span>Community &amp; Growth · CIS</span>
          </div>
        </footer>
      );
    }

    function App() {
      React.useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
      return (
        <React.Fragment>
          <Nav />
          <main>
            <Hero />
            <About />
            <Quote />
            <Highlights />
            <Experience />
            <Skills />
            <Contact />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
